<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Sirkin 15 Rooftop Scheduler</title>

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green:  #10b981;
      --green-d:#059669;
      --red:    #ef4444;
      --red-d:  #dc2626;
      --amber:  #f59e0b;
      --gray-50:#f9fafb;
      --gray-100:#f3f4f6;
      --gray-200:#e5e7eb;
      --gray-400:#9ca3af;
      --gray-500:#6b7280;
      --gray-700:#374151;
      --gray-900:#111827;
      --radius: 12px;
      --shadow: 0 4px 24px rgba(0,0,0,.10);
    }
    html, body { height:100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background:var(--gray-50); color:var(--gray-900); }

    /* ── Header ── */
    header {
      background:#fff; border-bottom:1px solid var(--gray-200);
      padding:0 20px; height:60px;
      display:flex; align-items:center; justify-content:space-between;
      position:sticky; top:0; z-index:100;
    }
    .logo { display:flex; align-items:center; gap:10px; font-weight:700; font-size:18px; }
    .logo span { font-size:24px; }
    .btn { padding:10px 20px; border-radius:8px; border:none; cursor:pointer; font-size:15px; font-weight:600; transition:.15s; }
    .btn-green  { background:var(--green); color:#fff; }
    .btn-green:hover  { background:var(--green-d); }
    .btn-red    { background:var(--red);   color:#fff; }
    .btn-red:hover    { background:var(--red-d); }
    .btn-ghost  { background:transparent; color:var(--gray-700); border:1.5px solid var(--gray-200); }
    .btn-ghost:hover  { background:var(--gray-100); }
    .btn-amber  { background:var(--amber); color:#fff; }
    .btn-amber:hover  { background:#d97706; }
    .btn-sm { padding:7px 14px; font-size:13px; }

    /* ── Calendar wrapper ── */
    #calendar-wrap { padding:20px; max-width:1100px; margin:auto; }
    #calendar { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; }

    /* FullCalendar overrides */
    .fc .fc-toolbar-title { font-size:18px; font-weight:700; }
    .fc .fc-button { background:var(--green) !important; border-color:var(--green) !important; font-weight:600; }
    .fc .fc-button:hover { background:var(--green-d) !important; border-color:var(--green-d) !important; }
    .fc .fc-button-active { background:var(--green-d) !important; }
    .fc-event { cursor:pointer; border-radius:6px !important; border:none !important; font-size:13px; }
    .fc-event-title { font-weight:600; }
    @media(max-width:600px) {
      .fc .fc-toolbar { flex-direction:column; gap:8px; }
      .fc .fc-toolbar-title { font-size:15px; }
    }

    /* ── Modal backdrop ── */
    .modal-bg {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,.45); z-index:200;
      align-items:center; justify-content:center; padding:16px;
    }
    .modal-bg.open { display:flex; }
    .modal {
      background:#fff; border-radius:var(--radius); box-shadow:var(--shadow);
      width:100%; max-width:520px; max-height:90vh; overflow-y:auto;
      animation: slideUp .2s ease;
    }
    @keyframes slideUp { from { transform:translateY(20px); opacity:0; } to { transform:none; opacity:1; } }
    .modal-header {
      padding:20px 24px 16px; border-bottom:1px solid var(--gray-200);
      display:flex; align-items:center; justify-content:space-between;
    }
    .modal-header h2 { font-size:18px; font-weight:700; }
    .modal-close { background:none; border:none; font-size:22px; cursor:pointer; color:var(--gray-500); line-height:1; padding:0 4px; }
    .modal-body { padding:20px 24px; }
    .modal-footer { padding:16px 24px; border-top:1px solid var(--gray-200); display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap; }

    /* ── Form ── */
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-grid .full { grid-column:1/-1; }
    .field label { display:block; font-size:13px; font-weight:600; color:var(--gray-700); margin-bottom:5px; }
    .field input, .field textarea, .field select {
      width:100%; padding:10px 12px; border:1.5px solid var(--gray-200);
      border-radius:8px; font-size:15px; font-family:inherit; transition:.15s;
      background:#fff;
    }
    .field input:focus, .field textarea:focus {
      outline:none; border-color:var(--green); box-shadow:0 0 0 3px rgba(16,185,129,.12);
    }
    .field textarea { resize:vertical; min-height:72px; }
    .field .hint { font-size:12px; color:var(--gray-400); margin-top:4px; }

    /* ── Alerts ── */
    .alert { border-radius:8px; padding:12px 14px; font-size:14px; margin-bottom:14px; }
    .alert-err  { background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }
    .alert-ok   { background:#f0fdf4; border:1px solid #bbf7d0; color:#065f46; }
    .alert-warn { background:#fffbeb; border:1px solid #fde68a; color:#92400e; }

    /* ── Detail view ── */
    .detail-row { display:flex; gap:10px; margin-bottom:10px; font-size:15px; }
    .detail-label { color:var(--gray-500); min-width:80px; flex-shrink:0; }
    .detail-val { color:var(--gray-900); font-weight:500; }
    .chip { display:inline-block; background:var(--gray-100); border-radius:20px; padding:3px 10px; font-size:13px; color:var(--gray-700); }

    /* ── Token input view ── */
    .token-box { text-align:center; padding:8px 0 16px; }
    .token-box p { color:var(--gray-500); font-size:14px; margin-bottom:12px; }

    /* ── Success screen ── */
    .success-box { text-align:center; padding:8px 0; }
    .success-box .checkmark { font-size:48px; margin-bottom:12px; }
    .success-box h3 { font-size:20px; margin-bottom:6px; }
    .success-box p { color:var(--gray-500); font-size:14px; line-height:1.6; }
    .token-display {
      margin:16px auto; background:var(--gray-50); border:1.5px dashed var(--gray-200);
      border-radius:8px; padding:14px 16px; font-size:13px; word-break:break-all;
      color:var(--gray-700);
    }
    .token-display strong { display:block; margin-bottom:6px; color:var(--gray-900); }

    /* ── Loading ── */
    .spinner { display:inline-block; width:18px; height:18px; border:2.5px solid rgba(255,255,255,.4); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo"><span>🏙️</span> Sirkin 15 Rooftop Scheduler</div>
  <button class="btn btn-green" onclick="openBookingModal()">+ Reserve Rooftop</button>
</header>

<div id="calendar-wrap">
  <div id="calendar"></div>
</div>

<footer style="text-align:center;padding:20px;color:var(--gray-400);font-size:13px;">
  © Yuval Yehie
</footer>

<!-- ═══════════════════════ BOOKING MODAL ═══════════════════════ -->
<div class="modal-bg" id="bookingModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="bookingModalTitle">Reserve the Rooftop</h2>
      <button class="modal-close" onclick="closeBookingModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="bookingAlert"></div>
      <!-- Success screen (shown after booking) -->
      <div id="bookingSuccess" style="display:none">
        <div class="success-box">
          <div class="checkmark">🎉</div>
          <h3>Booking Confirmed!</h3>
          <p>Check your email for a confirmation and a link to edit or cancel your booking anytime.</p>
        </div>
      </div>
      <!-- Form -->
      <form id="bookingForm" onsubmit="submitBooking(event)" style="display:block">
        <div class="form-grid">
          <div class="field">
            <label>Building Number *</label>
            <input type="text" id="f-building" placeholder="e.g. A" required/>
          </div>
          <div class="field">
            <label>Apartment Number *</label>
            <input type="text" id="f-apartment" placeholder="e.g. 4B" required/>
          </div>
          <div class="field full">
            <label>Your Full Name *</label>
            <input type="text" id="f-name" placeholder="Jane Smith" required/>
          </div>
          <div class="field full">
            <label>Your Email *</label>
            <input type="email" id="f-email" placeholder="jane@example.com" required/>
            <div class="hint">For booking confirmation and reminder.</div>
          </div>
          <div class="field full">
            <label>Event Title *</label>
            <input type="text" id="f-title" placeholder="Birthday Party" required/>
          </div>
          <div class="field">
            <label>Start Date & Time *</label>
            <input type="datetime-local" id="f-start" required/>
          </div>
          <div class="field">
            <label>End Date & Time *</label>
            <input type="datetime-local" id="f-end" required/>
          </div>
          <div class="field full">
            <label>Description (optional)</label>
            <textarea id="f-desc" placeholder="Brief description of your event..."></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer" id="bookingFooter">
      <button class="btn btn-ghost" onclick="closeBookingModal()">Cancel</button>
      <button class="btn btn-green" onclick="submitBooking(event)" id="submitBtn">
        Confirm Booking
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════ DETAIL MODAL ═══════════════════════ -->
<div class="modal-bg" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="detailTitle">Booking Details</h2>
      <button class="modal-close" onclick="closeDetailModal()">×</button>
    </div>
    <div class="modal-body" id="detailBody">
      <!-- filled dynamically -->
    </div>
    <div class="modal-footer" id="detailFooter"></div>
  </div>
</div>

<!-- ═══════════════════════ EDIT MODAL ═══════════════════════ -->
<div class="modal-bg" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Edit Booking</h2>
      <button class="modal-close" onclick="closeEditModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="editAlert"></div>
      <form id="editForm" onsubmit="submitEdit(event)">
        <div class="form-grid">
          <div class="field">
            <label>Building Number *</label>
            <input type="text" id="e-building" required/>
          </div>
          <div class="field">
            <label>Apartment Number *</label>
            <input type="text" id="e-apartment" required/>
          </div>
          <div class="field full">
            <label>Your Full Name *</label>
            <input type="text" id="e-name" required/>
          </div>
          <div class="field full">
            <label>Your Email *</label>
            <input type="email" id="e-email" required/>
          </div>
          <div class="field full">
            <label>Event Title *</label>
            <input type="text" id="e-title" required/>
          </div>
          <div class="field">
            <label>Start Date & Time *</label>
            <input type="datetime-local" id="e-start" required/>
          </div>
          <div class="field">
            <label>End Date & Time *</label>
            <input type="datetime-local" id="e-end" required/>
          </div>
          <div class="field full">
            <label>Description (optional)</label>
            <textarea id="e-desc"></textarea>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-amber" onclick="submitEdit(event)" id="editSubmitBtn">Save Changes</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
